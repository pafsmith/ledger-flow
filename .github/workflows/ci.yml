name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ledgerflow_test
          POSTGRES_USER: ledgerflow_user
          POSTGRES_PASSWORD: ledgerflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgerflow_user -d ledgerflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ledgerflow_test
          DB_USERNAME: ledgerflow_user
          DB_PASSWORD: ledgerflow_password
          JWT_SECRET: ci-test-secret-key-must-be-at-least-32-chars
          JWT_EXPIRATION: 36000
        run: ./mvnw verify