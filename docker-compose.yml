services:
  postgres:
    image: postgres:16
    container_name: ledgerflow-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledgerflow}
      POSTGRES_USER: ${POSTGRES_USER:-ledgerflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerflow_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgerflow_user} -d ${POSTGRES_DB:-ledgerflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: ledgerflow-app
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
